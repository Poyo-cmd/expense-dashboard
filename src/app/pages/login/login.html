<div class="page">
  <div class="card">
    <h2>{{ isRegister ? 'Crear cuenta' : 'Iniciar sesión' }}</h2>
    <p class="sub">{{ isRegister ? 'Empieza a gestionar tus gastos.' : 'Bienvenido de vuelta.' }}</p>

    <div class="form">
      @if (isRegister) {
        <div class="field">
          <label>Nombre</label>
          <input type="text" [(ngModel)]="nombre" placeholder="Tu nombre" />
        </div>
      }
      <div class="field">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" placeholder="tu@email.com" />
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" [(ngModel)]="password" placeholder="••••••" (keydown.enter)="submit()" />
      </div>

      @if (error) {
        <p class="error">{{ error }}</p>
      }

      <button class="btn-submit" (click)="submit()" [disabled]="loading">
        {{ loading ? 'Cargando...' : (isRegister ? 'Crear cuenta' : 'Entrar') }}
      </button>
    </div>

    <p class="switch">
      {{ isRegister ? '¿Ya tienes cuenta?' : '¿No tienes cuenta?' }}
      <button class="btn-link" (click)="isRegister = !isRegister">
        {{ isRegister ? 'Inicia sesión' : 'Regístrate' }}
      </button>
    </p>
  </div>
</div>
